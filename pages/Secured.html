    <script>
        async function deriveKey(password, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw",
                enc.encode(password),
                "PBKDF2",
                false,
                ["deriveKey"]
            );

            return crypto.subtle.deriveKey(
                {
                    name: "PBKDF2",
                    salt: salt,
                    iterations: 100000,
                    hash: "SHA-256",
                },
                keyMaterial,
                {
                    name: "AES-GCM",
                    length: 256
                },
                false,
                ["decrypt"]
            );
        }
        async function decryptHTML(base64Data, password) {

            const raw = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
            const salt = raw.slice(0, 16);
            const iv = raw.slice(16, 32);
            const tag = raw.slice(32, 48);
            const ciphertext = raw.slice(48);
            const key = await deriveKey(password, salt);
            const decrypted = await crypto.subtle.decrypt(
                {
                    name: "AES-GCM",
                    iv: iv,
                    tagLength: 128
                },
                key,
                concatBuffers(ciphertext, tag)
            );
            const result = new TextDecoder().decode(decrypted);
            return result
        }
        function concatBuffers(a, b) {
            const result = new Uint8Array(a.length + b.length);
            result.set(a);
            result.set(b, a.length);
            return result;
        }

        window.addEventListener("message", (event) => {

            const data = event.data;
            const passKey = data.passKey;

            (async () => {

                const params = new URLSearchParams(window.location.search);
                const content = params.get("content");
                let contentHtml = `<div>No secured content</div>`;

                switch (content) {
                    case "lifenavapi":
                        contentHtml = await decryptHTML(lifenavEncrypted, passKey);
                        break;
                }

                document.getElementById("iframe-content").innerHTML = contentHtml;
            })();
        });
    </script>
